name: Bug Report
description:  App failing to install? App still around after uninstalling? Something not working as expected? Some other problem?
labels: ["bug"]
body:
  - type: checkboxes
    attributes:
      label: Confirmations
      options:
      - label: I searched for similar bug reports in https://github.com/Jaypph/pi-apps-amd64/issues and found none were relevant.
        required: true
      - label: I tried updating Pi-Apps and the issue is still not fixed. [How to update Pi-Apps-Amd64?](https://github.com/Jaypph/pi-apps-amd64-wiki/)
        required: false
      - label: 'IMPORTANT: I promise to respond to comments on this issue and write a good bug report https://www.softwaretestinghelp.com/how-to-write-good-bug-report/'
        required: true
  - type: input
    id: desc
    attributes:
      label: What happened?
      description: Briefly explain what happened.
      placeholder: "Ex. 'App' won't install, 'App' unable to launch after update"
    validations:
      required: true
  - type: textarea
    id: desc-long
    attributes:
      label: Description
      description: A clear and concise description of what the bug is and any personal attempts you made to fix it.
      placeholder: Tell us more!
    validations: 
      required: true
  - type: textarea
    id: os
    attributes:
      label: What are your system specs (run the following command in your terminal)?
      description: ~/pi-apps/api get_device_info
      placeholder: |
        OS: Debian GNU/Linux 12 (bookworm)
        OS architecture: 64-bit (x86_64)
        Environment: Google Crostini (Linux Container)
        Last updated Pi-Apps-Amd64 on: 1/1/2026
        Latest Pi-Apps-Amd64 version: 1/1/2026
        Kernel: AMD64 2.6.1 (Virtual Container Kernel)
        Device model: Lenovo 300e Chromebook Gen 3
        Board Name: Bluebird
        ChromeOS Family: Zork
        SOC identifier: AMD Zen (Raven Ridge)
        CPU name: AMD 3015Ce (2 Cores, 4 Threads)
        GPU name: AMD Radeon™ Graphics (Integrated)
        RAM size: 4 GB DDR4
        Storage type: eMMC 5.1 / NVMe (afhængig af konfiguration)
        Language: en_US.UTF-8
      render: bash
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: (Recommended) Error log? Terminal output? Debug messages?
      description: Please provide error log or terminal output, if available.
      placeholder: Paste your terminal output/error log here
      render: bash
    validations:
      required: false

